# ============================================================
# PolySnipe Configuration
# Restart required to apply changes.
# ============================================================

# --- Connection ---
connection:
  websocket_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  rest_base_url: "https://clob.polymarket.com"
  wallet_private_key: "${POLYMARKET_WALLET_KEY}"  # hex private key — Phantom EOA, signs orders
  funder_address: "${POLYMARKET_FUNDER_ADDRESS}"  # Gnosis Safe proxy address shown on polymarket.com/profile
  api_key: "${POLYMARKET_API_KEY}"                # derived via py-clob-client — POLY_API_KEY L2 header
  api_secret: "${POLYMARKET_API_SECRET}"          # derived base64url secret — HMAC L2 signing key
  passphrase: "${POLYMARKET_PASSPHRASE}"          # derived passphrase — POLY_PASSPHRASE L2 header
  reconnect_max_retries: 10
  reconnect_backoff_base_ms: 500
  reconnect_backoff_max_ms: 30000
  request_timeout_ms: 5000

# --- Dry Run (paper trading) ---
# When true, uses a simulated executor: real market data, no real orders.
dry_run: false
dry_run_balance: 20.0

# --- Market Discovery ---
discovery:
  enabled: true
  poll_interval_seconds: 60
  gamma_api_url: "https://gamma-api.polymarket.com"
  rate_limit_per_second: 10
  max_markets: 20                             # cap on simultaneous WebSocket subscriptions (0 = unlimited)
  max_spread_cents: 5                         # drop market if bid-ask spread > N cents on first tick (0 = disabled)
  updown_max_spread_cents: 5                 # spread threshold override for up-or-down markets (0 = use max_spread_cents)
  stale_market_timeout_sec: 15               # drop market if no price tick received within this window (0 = disabled)
  updown_stale_timeout_sec: 60              # stale timeout for up-or-down markets (longer grace period; 0 = use default)
  updown_markets:
    enabled: true
    assets: ["btc", "eth", "sol", "xrp"]    # generates 15m and 1h slug candidates each poll cycle

  watchlists:
    - name: "short-expiry-any"
      tags: []
      filters:
        max_expiry_minutes: 10
        min_volume_24h: 1000.0
        active: true

    - name: "live-games"
      tags: []
      filters:
        title_contains: "In-Game Trading"
        min_volume_24h: 500.0
        active: true

# --- Execution ---
execution:
  order_type: "limit"                      # only "limit" supported
  default_limit_offset_bps: 10             # basis points from mid for limit price
  order_timeout_seconds: 30                # cancel unfilled orders after this
  partial_fill_action: "keep"              # "keep" or "cancel" on partial fill
  retry_on_failure: true
  retry_max_attempts: 3
  retry_backoff_ms: 200
  cooldown_between_orders_ms: 100
  max_order_spread_cents: 5.0            # skip order if real-time spread > this (0 = disabled)
  fee_rate_bps: 0                        # max fee rate accepted in orders (0 = protocol default)

# --- Sizing (Kelly Criterion) ---
sizing:
  method: "kelly"                          # "kelly" or "fixed_fraction"
  kelly_fraction: 0.25                     # quarter-Kelly
  kelly_min_sample_size: 20                # trades needed before Kelly kicks in
  fixed_fraction_fallback: 0.02            # 2% of balance when insufficient data
  min_order_size: 5.0                      # minimum order size (Polymarket enforces min 5 tokens)
  max_order_size: 500.0                    # maximum dollar order regardless of Kelly

# --- Risk Management ---
risk:
  global:
    max_total_exposure: 5000.0
    session_loss_limit: -500.0
    max_daily_trades: 200
    max_drawdown_pct: 15.0                 # halt if drawdown exceeds 15% from peak
  per_market:
    default:
      max_exposure: 2000.0
      max_strategies_active: 4
    tag_overrides:                         # tag-based overrides (since market IDs are dynamic)
      crypto:
        max_exposure: 3000.0
      nba:
        max_exposure: 1000.0
  per_strategy:
    default:
      max_position_size: 500.0
      max_open_orders: 1
    overrides:                             # per-strategy overrides
      spread_threshold:
        max_position_size: 200.0
        max_open_orders: 1

# --- Strategies ---
strategies:
  spread_threshold:
    enabled: false
    tags: []
    params:
      spread_trigger_bps: 50
      spread_exit_bps: 20
      side: "cheap"
  momentum:
    enabled: false
    tags: []
    params:
      consecutive_ticks: 5
      min_move_bps: 10
      hold_duration_seconds: 60
  time_decay:
    enabled: false
    tags: []
    params:
      trigger_remaining_seconds: 0
      skew_threshold: 0.80
  # --- Stub slots for user-implemented strategies ---
  mid_flip:
    enabled: false
    tags: []
    params: {}
  reversal_snipe:
    enabled: false
    tags: []
    params: {}
  last_second_collapse:
    enabled: false
    tags: []
    params: {}
  strategy_7:
    enabled: false
    tags: []
    params: {}
  strategy_8:
    enabled: false
    tags: []
    params: {}
  sma_reversion:
    enabled: true
    tags: ["up-or-down"]
    params:
      sma_period: 20
      min_price: 0.20
      max_price: 0.80
      stop_loss_cents: 2.0

# --- Backtesting ---
backtest:
  enabled: false                           # set true to run in backtest mode
  start_date: "2025-01-01"
  end_date: "2025-03-01"
  starting_balance: 10000.0
  fee_rate_bps: 20                         # Polymarket fee rate in basis points
  data_cache_dir: "./data/historical"
  output_dir: "./data/backtest_results"
  fill_model: "optimistic"                 # "optimistic" or "midpoint"

# --- Logging ---
logging:
  level: "debug"                           # debug, info, warn, error
  log_signals: true
  log_executions: true
  log_ticks: false
  output_dir: "./logs"
  format: "json"
  max_file_size_mb: 50
  max_files: 10

# --- Dashboard ---
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8081
  auth_token: "${DASHBOARD_AUTH_TOKEN}"
  websocket_push_interval_ms: 500
  cors_allowed_origins: ["*"]
